{% extends "base.html" %}

{% block extrahead %}
  {% set og_title = config.site_name ~ " — no masters, no lighthouses, just mesh" %}
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{{ page.title ~ ' · ' ~ config.site_name if page and page.title and not page.is_homepage else og_title }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta property="og:image" content="{{ config.site_url }}assets/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ config.site_url }}assets/og-card.png">
  <meta name="theme-color" content="#171a21">
{% endblock %}
