site_name: Junkmesh
site_description: >-
  A truly decentralised community cloud. Old laptops, an Yggdrasil mesh,
  Garage storage — and no one in charge.
site_url: https://junkmesh.com
repo_url: https://github.com/lukeharg/junkmesh
repo_name: lukeharg/junkmesh
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - About:
      - about/index.md
      - Why Junkmesh: about/why.md
      - Junkmesh vs Junk Net: about/junknet.md
      - FAQ: about/faq.md
      - Roadmap: about/roadmap.md
  - Architecture:
      - architecture/index.md
      - Network layer — Yggdrasil: architecture/network.md
      - Storage layer — Garage: architecture/storage.md
      - Access control: architecture/access-control.md
  - Install:
      - install/index.md
      - 1 · Download the ISO: install/download.md
      - 2 · Write it to USB: install/usb.md
      - 3 · First boot & install: install/first-boot.md
      - 4 · Join the mesh: install/join.md
      - Build the ISO yourself: install/build.md
  - Operate:
      - operate/index.md
      - Running a node: operate/node.md
      - Using the storage: operate/storage.md
      - Metrics & monitoring: operate/metrics.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lukeharg/junkmesh
    - icon: material/email
      link: mailto:info@aquainnis.com

copyright: >-
  Junkmesh · an experiment from the maker of Junk Net · Apache-2.0 ·
  no servers, no operators — every node is self-hosted
